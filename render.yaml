services:
  - type: web
    name: shusixue-backend
    env: docker
    rootDir: shusixue-backend
    plan: free
    envVars:
      - key: SERVER_PORT
        value: "8081"
      - key: MYSQL_HOST
        sync: false
      - key: MYSQL_PORT
        sync: false
      - key: MYSQL_DATABASE
        sync: false
      - key: MYSQL_USER
        sync: false
      - key: MYSQL_PASSWORD
        sync: false
      - key: REDIS_HOST
        sync: false
      - key: REDIS_PORT
        sync: false
